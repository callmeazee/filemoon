<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filemoon | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>
   
    <script src="https://cdn.jsdelivr.net/npm/notyf@3.10.0/notyf.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/notyf@3.10.0/notyf.min.css"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div
      class="bg-white p-10 rounded-[2.5rem] shadow-xl shadow-slate-200/50 w-full max-w-md animate__animated animate__fadeIn">
      <div class="flex flex-col items-center mb-10">
        <div
          class="bg-violet-600 p-4 rounded-2xl shadow-lg shadow-violet-200 mb-4">
          <i data-lucide="moon" class="text-white w-10 h-10"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">
          Filemoon
        </h1>
        <p class="text-slate-400 font-medium mt-1">Welcome back, Explorer!</p>
      </div>

      <form  class="space-y-5" onsubmit="login(event)">
        <div class="space-y-1">
          <label class="text-xs font-bold text-slate-400 uppercase ml-2"
            >Email Address</label
          >
          <input
            type="email"
            required
            placeholder="email@mail.com"
            name="email"
            class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-violet-500 outline-none transition-all" />
        </div>
        <div class="space-y-1">
          <div class="flex justify-between items-center px-2">
            <label class="text-xs font-bold text-slate-400 uppercase"
              >Password</label
            >
            <a
              href="#"
              class="text-xs font-bold text-violet-600 hover:underline"
              >Forgot?</a
            >
          </div>
          <input
            type="password"
            required
            placeholder="********"
            name="password"
            class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-violet-500 outline-none transition-all" />
        </div>

        <button
          type="submit"
          class="w-full bg-violet-600 text-white py-5 rounded-2xl font-black text-lg hover:bg-violet-700 transition-all shadow-xl shadow-violet-200 active:scale-[0.98]">
          Sign In
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-slate-500 font-medium">
          Don't have an account?
          <a
            href="signup.html"
            class="text-violet-600 font-bold hover:underline"
            >Create one</a
          >
        </p>
      </div>
    </div>

  <script src="js/login.js"></script>
     <script>
      lucide.createIcons();
      
    </script>
  </body>
</html>

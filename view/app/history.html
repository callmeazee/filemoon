<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filemoon | History</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="icon" type="image/png" href="../favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet" />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .sidebar-transition {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .nav-item.active {
        background: #f43f5e;
        color: white;
        box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.2);
      }
      .dark body {
        background: #0b1220;
      }
      .dark #sidebar,
      .dark header,
      .dark .surface {
        background: #111827 !important;
      }
      .dark #sidebar {
        border-color: #1f2937;
      }
      .dark header {
        border-color: #1f2937;
      }
      .dark .surface {
        border-color: #1f2937 !important;
      }
      .dark .text-slate-800,
      .dark .text-slate-700,
      .dark .text-slate-600,
      .dark .text-slate-500,
      .dark .text-slate-400 {
        color: #e2e8f0 !important;
      }
    </style>
  </head>
  <body class="bg-[#fdfdff] flex h-screen overflow-hidden">
    <aside
      id="sidebar"
      class="sidebar-transition fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-100 flex flex-col transform translate-x-0 lg:relative lg:translate-x-0 shadow-2xl lg:shadow-none">
      <div class="p-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="bg-violet-600 p-2 rounded-xl">
            <i data-lucide="moon" class="text-white w-6 h-6"></i>
          </div>
          <span class="text-xl font-black text-slate-800 tracking-tighter"
            >Filemoon</span
          >
        </div>
        <button onclick="toggleSidebar()" class="lg:hidden p-2">
          <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
        </button>
      </div>
      <nav class="flex-1 px-4 space-y-2 mt-4">
        <a
          href="/dashboard"
          class="nav-item w-full flex items-center gap-3 p-3.5 rounded-xl text-slate-400 hover:bg-slate-50 transition-all">
          <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
          <span class="font-bold">Dashboard</span>
        </a>
        <a
          href="/files"
          class="nav-item w-full flex items-center gap-3 p-3.5 rounded-xl text-slate-400 hover:bg-slate-50 transition-all">
          <i data-lucide="folder-open" class="w-5 h-5"></i>
          <span class="font-bold">My Files</span>
        </a>
        <a
          href="/history"
          class="nav-item active w-full flex items-center gap-3 p-3.5 rounded-xl transition-all">
          <i data-lucide="history" class="w-5 h-5"></i>
          <span class="font-bold">History</span>
        </a>
      </nav>
      <div class="p-4 border-t border-slate-100">
        <a
          href="#"
          onclick="logout()"
          class="flex items-center gap-3 p-3.5 rounded-xl text-rose-500 hover:bg-rose-50 transition-all font-semibold">
          <i data-lucide="log-out" class="w-5 h-5"></i>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <header
        class="p-4 flex justify-between items-center bg-white border-b border-slate-50">
        <button onclick="toggleSidebar()" class="p-2 bg-slate-50 rounded-xl">
          <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
        <h1 class="font-black text-slate-800">History</h1>
        <button
          id="theme-toggle"
          class="p-2 bg-slate-50 rounded-xl text-slate-600">
          <i id="theme-toggle-icon" data-lucide="moon" class="w-5 h-5"></i>
        </button>
      </header>

      <div class="p-4 md:p-8 overflow-y-auto animate__animated animate__fadeIn">
        <div
          class="bg-white surface rounded-[2.5rem] border border-slate-50 shadow-sm overflow-hidden">
          <table class="w-full text-left">
            <thead class="bg-slate-900 text-white text-xs uppercase">
              <tr>
                <th class="p-5">Activity</th>
                <th class="p-5">Time</th>
              </tr>
            </thead>
            <tbody class="text-slate-600 divide-y divide-slate-50">
              <tr>
                <td class="p-5">
                  You uploaded <span class="font-bold">report.pdf</span>
                </td>
                <td class="p-5 text-xs">2 mins ago</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
    <script src="../js/env.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/history.js"></script>
  </body>
</html>

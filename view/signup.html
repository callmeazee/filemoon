<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filemoon | Create Account</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/notyf@3.10.0/notyf.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/notyf@3.10.0/notyf.min.css"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet" />

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .input-group:focus-within label {
        color: #7c3aed;
      }
      .custom-shadow {
        box-shadow: 0 25px 50px -12px rgba(124, 58, 237, 0.1);
      }
    </style>
  </head>
  <body class="bg-[#fdfdff] min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-[480px] animate__animated animate__fadeIn">
      <div class="flex flex-col items-center mb-10">
        <div
          class="bg-violet-600 p-4 rounded-3xl shadow-xl shadow-violet-200 mb-6 transform hover:rotate-12 transition-transform cursor-pointer">
          <i data-lucide="moon" class="text-white w-10 h-10"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tighter">
          Create Account
        </h1>
        <p class="text-slate-400 font-medium mt-2 text-center">
          Join 10,000+ developers managing files on the moon.
        </p>
      </div>

      <div
        class="bg-white p-8 sm:p-10 rounded-[3rem] border border-slate-100 custom-shadow">
        <form class="space-y-6" onsubmit="signup(event)">
          <div class="input-group space-y-2">
            <label
              class="text-xs font-extrabold text-slate-400 uppercase tracking-widest ml-1 transition-colors"
              >Full Name</label
            >
            <div class="relative">
              <i
                data-lucide="user"
                class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
              <input
                type="text"
                required
                name="fullname"
                placeholder="Er Saurav"
                class="w-full pl-14 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-violet-600 outline-none transition-all font-medium text-slate-700" />
            </div>
          </div>

          <div class="input-group space-y-2">
            <label
              class="text-xs font-extrabold text-slate-400 uppercase tracking-widest ml-1 transition-colors"
              >Mobile Number</label
            >
            <div class="relative">
              <i
                data-lucide="phone"
                class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
              <input
                type="tel"
                required
                placeholder="+91 00000 00000"
                name="mobile"
                class="w-full pl-14 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-violet-600 outline-none transition-all font-medium text-slate-700" />
            </div>
          </div>

          <div class="input-group space-y-2">
            <label
              class="text-xs font-extrabold text-slate-400 uppercase tracking-widest ml-1 transition-colors"
              >Email Address</label
            >
            <div class="relative">
              <i
                data-lucide="mail"
                class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
              <input
                type="email"
                required
                placeholder="saurav@filemoon.com"
                name="email"
                class="w-full pl-14 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-violet-600 outline-none transition-all font-medium text-slate-700" />
            </div>
          </div>

          <div class="input-group space-y-2">
            <label
              class="text-xs font-extrabold text-slate-400 uppercase tracking-widest ml-1 transition-colors"
              >Password</label
            >
            <div class="relative">
              <i
                data-lucide="lock"
                class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
              <input
                type="password"
                required
                placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢"
                name="password"
                class="w-full pl-14 pr-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-violet-600 outline-none transition-all font-medium text-slate-700" />
            </div>
          </div>

          <button
            type="submit"
            class="w-full bg-violet-600 text-white py-5 rounded-2xl font-bold text-lg hover:bg-violet-700 transition-all shadow-xl shadow-violet-100 mt-4 active:scale-[0.98] flex items-center justify-center gap-3">
            Start Your Journey
            <i data-lucide="chevron-right" class="w-5 h-5"></i>
          </button>
        </form>
      </div>

      <p class="text-center mt-8 text-slate-500 font-medium">
        Already have an account?
        <a
          href="index.html"
          class="text-violet-600 font-bold hover:underline ml-1"
          >Log in here</a
        >
      </p>
    </div>

    <script src="./js/signup.js"></script>
  </body>
</html>

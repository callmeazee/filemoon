<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FileMoon - Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }

      /* Floating Label Animation */
      .form-group {
        position: relative;
      }

      .form-input {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
      }

      .form-input:focus {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(59, 130, 246, 0.5);
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        outline: none;
      }

      .form-label {
        position: absolute;
        left: 1rem;
        top: 0.75rem;
        color: rgba(226, 232, 240, 0.6);
        transition: all 0.3s ease;
        pointer-events: none;
        font-size: 0.875rem;
      }

      .form-input:focus ~ .form-label,
      .form-input:not(:placeholder-shown) ~ .form-label {
        transform: translateY(-1.75rem);
        color: rgba(59, 130, 246, 0.8);
        font-size: 0.75rem;
      }

      /* Tab Animation */
      .tab-indicator {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Smooth fade transitions */
      .auth-form {
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
      }

      .auth-form.hidden {
        opacity: 0;
        transform: translateY(10px);
        pointer-events: none;
      }

      /* Button hover effects */
      .btn-primary {
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
      }

      .btn-secondary {
        transition: all 0.3s ease;
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
      }

      /* Social button styles */
      .social-btn {
        transition: all 0.3s ease;
      }

      .social-btn:hover {
        background: rgba(59, 130, 246, 0.1);
        border-color: rgba(59, 130, 246, 0.3);
        transform: scale(1.05);
      }
    </style>
  </head>

  <body
    class="min-h-screen bg-gradient-to-br from-[#050505] via-[#0c1117] to-[#0f172a] text-[#e2e8f0]">
    <!-- Background gradient accent -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
      <div
        class="absolute top-1/4 left-1/4 w-96 h-96 bg-[#3b82f6]/5 rounded-full blur-3xl"></div>
      <div
        class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-[#1e40af]/5 rounded-full blur-3xl"></div>
    </div>

    <!-- Main Container -->
    <div
      class="relative min-h-screen flex items-center justify-center px-4 py-12">
      <!-- Auth Card -->
      <div
        class="w-full max-w-md backdrop-blur-2xl bg-white/5 border border-white/10 rounded-3xl p-8 md:p-10 shadow-2xl">
        <!-- Header -->
        <div class="text-center mb-8">
          <div class="flex justify-center mb-4">
            <div
              class="grid h-12 w-12 place-items-center rounded-full bg-gradient-to-br from-[#3b82f6] to-[#1e40af] text-white shadow-lg shadow-[#3b82f6]/30">
              <svg
                viewBox="0 0 24 24"
                class="h-7 w-7"
                fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  fill="currentColor"
                  opacity="0.9" />
                <circle
                  cx="12"
                  cy="12"
                  r="1"
                  fill="currentColor"
                  opacity="0.6" />
                <circle
                  cx="15"
                  cy="9"
                  r="0.5"
                  fill="currentColor"
                  opacity="0.4" />
                <circle
                  cx="9"
                  cy="10"
                  r="0.3"
                  fill="currentColor"
                  opacity="0.3" />
              </svg>
            </div>
          </div>
          <h1 class="text-3xl font-bold tracking-tight text-white">FileMoon</h1>
          <p class="text-[#e2e8f0]/60 text-sm mt-2">
            Share files without the noise
          </p>
        </div>

        <!-- Tab Switcher -->
        <div
          class="flex gap-0 mb-8 bg-white/5 border border-white/10 rounded-full p-1">
          <button
            id="login-tab"
            class="flex-1 py-2.5 px-4 rounded-full font-medium text-sm transition-all duration-300 text-[#e2e8f0] hover:text-white"
            onclick="switchTab('login')">
            Login
          </button>
          <button
            id="signup-tab"
            class="flex-1 py-2.5 px-4 rounded-full font-medium text-sm transition-all duration-300 text-[#e2e8f0] hover:text-white"
            onclick="switchTab('signup')">
            Sign Up
          </button>
          <div
            id="tab-indicator"
            class="tab-indicator absolute bottom-1 left-1 w-[calc(50%-0.25rem)] h-11 bg-gradient-to-r from-[#3b82f6] to-[#1e40af] rounded-full -z-10 transition-all duration-300"></div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form space-y-4">
          <!-- Email Input -->
          <div class="form-group">
            <input
              type="email"
              placeholder=" "
              class="form-input w-full px-4 py-3 rounded-xl text-white placeholder-transparent"
              required />
            <label class="form-label">Email Address</label>
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <input
              type="password"
              placeholder=" "
              class="form-input w-full px-4 py-3 rounded-xl text-white placeholder-transparent"
              required />
            <label class="form-label">Password</label>
          </div>

          <!-- Forgot Password Link -->
          <div class="text-right">
            <a
              href="#"
              class="text-xs text-[#3b82f6] hover:text-[#60a5fa] transition-colors">
              Forgot Password?
            </a>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            class="btn-primary w-full py-3 bg-gradient-to-r from-[#3b82f6] to-[#1e40af] text-white font-semibold rounded-xl hover:shadow-lg transition-all">
            Sign In
          </button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="auth-form hidden space-y-4">
          <!-- Name Input -->
          <div class="form-group">
            <input
              type="text"
              placeholder=" "
              class="form-input w-full px-4 py-3 rounded-xl text-white placeholder-transparent"
              required />
            <label class="form-label">Full Name</label>
          </div>

          <!-- Email Input -->
          <div class="form-group">
            <input
              type="email"
              placeholder=" "
              class="form-input w-full px-4 py-3 rounded-xl text-white placeholder-transparent"
              required />
            <label class="form-label">Email Address</label>
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <input
              type="password"
              placeholder=" "
              class="form-input w-full px-4 py-3 rounded-xl text-white placeholder-transparent"
              required />
            <label class="form-label">Password</label>
          </div>

          <!-- Confirm Password Input -->
          <div class="form-group">
            <input
              type="password"
              placeholder=" "
              class="form-input w-full px-4 py-3 rounded-xl text-white placeholder-transparent"
              required />
            <label class="form-label">Confirm Password</label>
          </div>

          <!-- Terms Agreement -->
          <div class="flex items-start gap-2 text-xs text-[#e2e8f0]/70">
            <input type="checkbox" id="terms" class="mt-1" required />
            <label for="terms">
              I agree to the
              <a href="#" class="text-[#3b82f6] hover:text-[#60a5fa]"
                >Terms of Service</a
              >
              and
              <a href="#" class="text-[#3b82f6] hover:text-[#60a5fa]"
                >Privacy Policy</a
              >
            </label>
          </div>

          <!-- Signup Button -->
          <button
            type="submit"
            class="btn-primary w-full py-3 bg-gradient-to-r from-[#3b82f6] to-[#1e40af] text-white font-semibold rounded-xl hover:shadow-lg transition-all">
            Create Account
          </button>
        </form>

        <!-- Divider -->
        <div class="my-6 flex items-center gap-4">
          <div class="flex-1 h-px bg-white/10"></div>
          <span class="text-xs text-[#e2e8f0]/60">or continue with</span>
          <div class="flex-1 h-px bg-white/10"></div>
        </div>

        <!-- Social Login Buttons -->
        <div class="grid grid-cols-2 gap-4">
          <!-- Google Button -->
          <button
            type="button"
            class="social-btn py-3 px-4 border border-white/20 rounded-xl text-center transition-all hover:bg-white/10 hover:border-white/30">
            <svg
              class="w-5 h-5 mx-auto text-[#e2e8f0]"
              viewBox="0 0 24 24"
              fill="currentColor">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
          </button>

          <!-- GitHub Button -->
          <button
            type="button"
            class="social-btn py-3 px-4 border border-white/20 rounded-xl text-center transition-all hover:bg-white/10 hover:border-white/30">
            <svg
              class="w-5 h-5 mx-auto text-[#e2e8f0]"
              fill="currentColor"
              viewBox="0 0 24 24">
              <path
                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
            </svg>
          </button>
        </div>

        <!-- Footer Links -->
        <div
          class="mt-8 pt-6 border-t border-white/10 text-center text-xs text-[#e2e8f0]/60 space-y-2">
          <p>
            <a
              href="/"
              class="text-[#3b82f6] hover:text-[#60a5fa] transition-colors"
              >Back to Home</a
            >
          </p>
          <p>
            <a
              href="#"
              class="text-[#3b82f6] hover:text-[#60a5fa] transition-colors"
              >Privacy Policy</a
            >
            •
            <a
              href="#"
              class="text-[#3b82f6] hover:text-[#60a5fa] transition-colors"
              >Terms of Service</a
            >
          </p>
        </div>
      </div>
    </div>

    <script>
      let currentTab = "login";

      function switchTab(tab) {
        currentTab = tab;
        const loginForm = document.getElementById("login-form");
        const signupForm = document.getElementById("signup-form");
        const loginTab = document.getElementById("login-tab");
        const signupTab = document.getElementById("signup-tab");
        const tabIndicator = document.getElementById("tab-indicator");

        if (tab === "login") {
          // Show login, hide signup
          loginForm.classList.remove("hidden");
          signupForm.classList.add("hidden");

          // Update tab styles
          loginTab.classList.add("text-white");
          signupTab.classList.remove("text-white");

          // Move indicator
          tabIndicator.style.transform = "translateX(0)";
        } else {
          // Show signup, hide login
          loginForm.classList.add("hidden");
          signupForm.classList.remove("hidden");

          // Update tab styles
          loginTab.classList.remove("text-white");
          signupTab.classList.add("text-white");

          // Move indicator
          tabIndicator.style.transform = "translateX(100%)";
        }
      }

      // Handle form submissions
      document
        .getElementById("login-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          console.log("Login form submitted");
          // Add your login logic here
        });

      document
        .getElementById("signup-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          console.log("Signup form submitted");
          // Add your signup logic here
        });

      // Initialize the first tab
      switchTab("login");
    </script>
  </body>
</html>
